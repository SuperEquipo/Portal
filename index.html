<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HIGH PLACE</title>
    
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f3f4f6;
        }
        iframe {
            border: none; width: 100%; height: 100%;
        }
    </style>
</head>
<body>

    <iframe id="portal-frame" src=""></iframe>

    <script>
        // PEGA AQUÍ TU URL DEFINITIVA DE GOOGLE APPS SCRIPT (La que termina en /exec)
        const urlGoogleScript = "https://script.google.com/macros/s/AKfycbwy2UV4XzREfRpIX45eZq4wZ9gO_O_QM79z8r3l0mbX64XC6-sG_KJCYRUkQxDj5tllWw/exec";
        
        // Esto captura el ID exacto del cliente sin que el móvil lo borre
        const params = window.location.search;
        
        // Inyecta el enlace completo en el marco
        document.getElementById("portal-frame").src = urlGoogleScript + params;
    </script>
</body>
</html>
