<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SÚPER EQUIPO</title>
    <meta name="theme-color" content="#0f172a">

    <!-- Iconos universales -->
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" href="icon-192.png">

    <script>
        // 🌟 EL SEMÁFORO INTELIGENTE (LA IDEA QUE HAS TENIDO)
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

        if (!isIOS) {
            // SI ES ANDROID O PC: Le inyectamos el manifest para que sea una App a pantalla completa
            let manifestLink = document.createElement('link');
            manifestLink.rel = 'manifest';
            manifestLink.href = 'manifest.json';
            document.head.appendChild(manifestLink);

            // Cargamos el Service Worker para Android
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', function() {
                    navigator.serviceWorker.register('sw.js');
                });
            }
        } else {
            // SI ES IPHONE (iOS): NO le inyectamos la etiqueta de "Pantalla Completa".
            // Al añadirlo a la pantalla de inicio, se abrirá en el Safari normal.
            // Esto permite que el iFrame de Google cargue perfectamente y evitamos el ERROR 400.
            console.log("iOS detectado: Modo Pantalla Completa desactivado por seguridad de Apple.");
        }
    </script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f8fafc; }
        iframe { width: 100%; height: 100%; border: none; display: block; position: absolute; top: 0; left: 0; z-index: 10; opacity: 0; transition: opacity 0.5s ease; }
        
        #splash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 20; color: white; font-family: sans-serif;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #3b82f6; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="splash">
        <div class="spinner"></div>
        <h2 style="margin:0; font-size:16px; font-weight:600;">Cargando tu perfil...</h2>
    </div>

    <iframe id="pantalla-app" allow="camera; microphone; fullscreen; geolocation"></iframe>

    <script>
        const parametrosWeb = window.location.search; 
        const urlGoogleScript = "https://script.google.com/macros/s/AKfycbwy2UV4XzREfRpIX45eZq4wZ9gO_O_QM79z8r3l0mbX64XC6-sG_KJCYRUkQxDj5tllWw/exec";
        
        const iframe = document.getElementById("pantalla-app");
        const splash = document.getElementById("splash");

        iframe.src = urlGoogleScript + parametrosWeb;

        iframe.onload = function() {
            splash.style.opacity = "0";
            setTimeout(() => splash.style.display = "none", 500);
            iframe.style.opacity = "1";
        };

        window.addEventListener('message', function(event) {
            if (event.data === 'recargarApp') {
                splash.style.display = "flex"; 
                splash.style.opacity = "1";
                iframe.style.opacity = "0";
                window.location.reload(); 
            }
        });
    </script>
</body>
</html>
